version: "3.9"

services:
  app:
    image: nginx:latest
    container_name: 2-4_app
    ports:
      - "8080:80"
    volumes:
      - ../02_source_code:/usr/share/nginx/html:ro
    depends_on:
      - database

  database:
    image: postgres:15
    container_name: 2-4_database
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student_password
      POSTGRES_DB: practice_project
    ports:
      - "5432:5432"
    volumes:
      - ../03_database/2-4_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../03_database/2-4_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
